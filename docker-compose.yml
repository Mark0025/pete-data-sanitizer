version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pete-dm-clean
    ports:
      - "${PORT:-8765}:8765"
    volumes:
      # Mount uploads directory for persistent data
      - ./uploads:/app/uploads
      # Mount config for easy editing
      - ./config.yaml:/app/config.yaml:ro
      # Development: mount source for hot reload
      - ./pete_dm_clean:/app/pete_dm_clean
      - ./build_staging.py:/app/build_staging.py
      - ./loaders.py:/app/loaders.py
    environment:
      - UPLOADS_DIR=${UPLOADS_DIR:-uploads}
      - DB_ENABLED=${DB_ENABLED:-0}
      - DB_PATH=${DB_PATH:-uploads/metadata.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: >
      sh -c "uv run uvicorn pete_dm_clean.server:app
             --host 0.0.0.0
             --port 8765
             --reload
             --log-level ${LOG_LEVEL:-info}"

  # Optional: PostgreSQL for production metadata storage
